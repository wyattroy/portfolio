<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Wyatt Roy</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400;500&display=block" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--color-border);
    }
    .admin-wordmark {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    /* Login */
    .admin-login { max-width: 340px; margin: 100px auto; }
    .admin-login h1 {
      font-family: var(--font-mono);
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 28px;
    }
    .admin-login input {
      display: block;
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-surface);
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--color-text);
      margin-bottom: 10px;
    }
    .admin-login input:focus { outline: none; border-color: var(--color-accent); }
    .admin-login button {
      display: block;
      width: 100%;
      padding: 11px;
      background: var(--color-accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 4px;
      transition: background 150ms;
    }
    .admin-login button:hover { background: #486688; }
    .admin-login button:disabled { opacity: 0.6; cursor: not-allowed; }
    .admin-error {
      font-size: 0.83rem;
      color: #c0392b;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* Tabs */
    .admin-tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 28px;
    }
    .admin-tab {
      padding: 9px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 150ms;
    }
    .admin-tab.active { color: var(--color-text); border-bottom-color: var(--color-accent); }
    .admin-tab:hover:not(.active) { color: var(--color-text); }

    /* Comment cards */
    .comment-card {
      border: 1px solid var(--color-border);
      border-left: 3px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      margin-bottom: 14px;
      background: var(--color-surface);
    }
    .comment-card.pending  { border-left-color: #C9943A; }
    .comment-card.approved { border-left-color: var(--color-accent-2); }
    .comment-card.hidden   { border-left-color: var(--color-text-muted); opacity: 0.65; }

    .comment-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .comment-author { font-weight: 500; font-size: 0.92rem; }
    .comment-email  {
      font-family: var(--font-mono);
      font-size: 0.73rem;
      color: var(--color-text-muted);
    }
    .comment-project {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-accent);
    }
    .comment-date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--color-text-muted);
      margin-left: auto;
    }

    .comment-link-row {
      font-family: var(--font-mono);
      font-size: 0.76rem;
      color: var(--color-accent);
      margin-bottom: 10px;
    }
    .comment-link-row a { color: inherit; }
    .comment-link-row a:hover { text-decoration: underline; }

    .comment-body {
      font-size: 0.92rem;
      line-height: 1.6;
      max-width: 600px;
      color: var(--color-text);
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    .comment-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .admin-btn {
      padding: 5px 13px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: none;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--color-text-muted);
      transition: all 150ms;
    }
    .admin-btn:hover          { border-color: var(--color-accent); color: var(--color-accent); }
    .admin-btn.approve        { border-color: var(--color-accent-2); color: var(--color-accent-2); }
    .admin-btn.approve:hover  { background: var(--color-accent-2); color: #fff; }
    .admin-btn.danger:hover   { border-color: #c0392b; color: #c0392b; }

    /* Inline edit */
    .comment-edit-form { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .comment-edit-form input,
    .comment-edit-form textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--color-text);
    }
    .comment-edit-form textarea { min-height: 80px; resize: vertical; }
    .comment-edit-form input:focus,
    .comment-edit-form textarea:focus { outline: none; border-color: var(--color-accent); }
    .comment-edit-row { display: flex; gap: 8px; }

    .admin-state { text-align: center; padding: 60px 0; color: var(--color-text-muted); font-size: 0.88rem; }
  </style>
</head>
<body>

<div id="app">
  <div class="admin-state">Loading…</div>
</div>

<script type="module">
  // ── Config — same values as project.html ──────────────────────────────────
  const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
  // ──────────────────────────────────────────────────────────────────────────

  const esc = s => s ? String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';

  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true },
  });

  const app = document.getElementById('app');

  // ── Auth ───────────────────────────────────────────────────────────────────
  async function boot() {
    const { data: { session } } = await db.auth.getSession();
    session ? renderAdmin() : renderLogin();
  }

  function renderLogin() {
    app.innerHTML = `
      <div class="admin-login">
        <h1>Wyatt Roy — Admin</h1>
        <form id="login-form">
          <input type="email" id="l-email" placeholder="Email" autocomplete="email" required>
          <input type="password" id="l-pass"  placeholder="Password" autocomplete="current-password" required>
          <button type="submit" id="l-btn">Sign in</button>
        </form>
        <p class="admin-error" id="l-err"></p>
      </div>
    `;

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('l-btn');
      const err = document.getElementById('l-err');
      btn.textContent = 'Signing in…'; btn.disabled = true; err.textContent = '';

      const { error } = await db.auth.signInWithPassword({
        email:    document.getElementById('l-email').value,
        password: document.getElementById('l-pass').value,
      });

      if (error) {
        btn.textContent = 'Sign in'; btn.disabled = false;
        err.textContent = error.message;
      } else {
        renderAdmin();
      }
    });
  }

  // ── Admin ──────────────────────────────────────────────────────────────────
  let allComments = [];
  let activeTab   = 'pending';

  async function renderAdmin() {
    app.innerHTML = `
      <div class="admin-header">
        <span class="admin-wordmark">Wyatt Roy — Comments</span>
        <button id="signout-btn" class="admin-btn">Sign out</button>
      </div>
      <div class="admin-tabs" id="admin-tabs"></div>
      <div id="admin-content"><div class="admin-state">Loading comments…</div></div>
    `;

    document.getElementById('signout-btn').addEventListener('click', async () => {
      await db.auth.signOut();
      renderLogin();
    });

    await reload();
  }

  async function reload() {
    const { data, error } = await db
      .from('comments')
      .select('*')
      .order('created_at', { ascending: false });

    allComments = data || [];
    renderTabs();
    renderList();
  }

  function visibleComments() {
    switch (activeTab) {
      case 'pending':  return allComments.filter(c => !c.approved && !c.hidden);
      case 'approved': return allComments.filter(c =>  c.approved && !c.hidden);
      case 'hidden':   return allComments.filter(c =>  c.hidden);
      default:         return allComments;
    }
  }

  function renderTabs() {
    const counts = {
      pending:  allComments.filter(c => !c.approved && !c.hidden).length,
      approved: allComments.filter(c =>  c.approved && !c.hidden).length,
      hidden:   allComments.filter(c =>  c.hidden).length,
      all:      allComments.length,
    };
    const tabs = ['pending','approved','hidden','all'];
    const labels = { pending:'Pending', approved:'Approved', hidden:'Hidden', all:'All' };

    const el = document.getElementById('admin-tabs');
    el.innerHTML = tabs.map(id =>
      `<button class="admin-tab${id === activeTab ? ' active' : ''}" data-tab="${id}">
        ${labels[id]} (${counts[id]})
      </button>`
    ).join('');

    el.querySelectorAll('.admin-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        renderTabs();
        renderList();
      });
    });
  }

  function renderList() {
    const content = document.getElementById('admin-content');
    const items = visibleComments();
    if (!items.length) {
      content.innerHTML = '<div class="admin-state">No comments in this category.</div>';
      return;
    }
    content.innerHTML = '';
    for (const c of items) content.appendChild(buildCard(c));
  }

  function buildCard(c) {
    const statusClass = c.hidden ? 'hidden' : (c.approved ? 'approved' : 'pending');
    const date = new Date(c.created_at).toLocaleDateString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
    });

    const card = document.createElement('div');
    card.className = `comment-card ${statusClass}`;
    card.id = `card-${c.id}`;

    const linkRow = c.link
      ? `<div class="comment-link-row">↗ <a href="${esc(c.link)}" target="_blank" rel="noopener">${esc(c.link)}</a></div>`
      : '';

    const approveBtn = !c.approved && !c.hidden
      ? `<button class="admin-btn approve" data-action="approve">Approve</button>`
      : '';
    const unapproveBtn = c.approved && !c.hidden
      ? `<button class="admin-btn" data-action="unapprove">Unapprove</button>`
      : '';
    const hideBtn = !c.hidden
      ? `<button class="admin-btn" data-action="hide">Hide</button>`
      : `<button class="admin-btn approve" data-action="unhide">Unhide</button>`;

    card.innerHTML = `
      <div class="comment-meta">
        <span class="comment-author">${esc(c.name)}</span>
        <span class="comment-email">${esc(c.email)}</span>
        <span class="comment-project">${esc(c.project_id)}</span>
        <span class="comment-date">${esc(date)}</span>
      </div>
      ${linkRow}
      <div class="comment-body" id="body-${esc(c.id)}">${esc(c.comment)}</div>
      <div class="comment-actions" id="actions-${esc(c.id)}">
        ${approveBtn}
        ${unapproveBtn}
        <button class="admin-btn" data-action="edit">Edit</button>
        ${hideBtn}
        <button class="admin-btn danger" data-action="delete">Delete</button>
      </div>
    `;

    card.querySelectorAll('[data-action]').forEach(btn =>
      btn.addEventListener('click', () => doAction(btn.dataset.action, c, card))
    );

    return card;
  }

  function refreshCard(card, c) {
    const fresh = buildCard(c);
    card.replaceWith(fresh);
  }

  async function doAction(action, c, card) {
    switch (action) {
      case 'approve': {
        const { error } = await db.from('comments').update({ approved: true }).eq('id', c.id);
        if (!error) { c.approved = true; refreshCard(card, c); renderTabs(); }
        break;
      }
      case 'unapprove': {
        const { error } = await db.from('comments').update({ approved: false }).eq('id', c.id);
        if (!error) { c.approved = false; refreshCard(card, c); renderTabs(); }
        break;
      }
      case 'hide': {
        const { error } = await db.from('comments').update({ hidden: true }).eq('id', c.id);
        if (!error) { c.hidden = true; refreshCard(card, c); renderTabs(); }
        break;
      }
      case 'unhide': {
        const { error } = await db.from('comments').update({ hidden: false }).eq('id', c.id);
        if (!error) { c.hidden = false; refreshCard(card, c); renderTabs(); }
        break;
      }
      case 'edit': {
        startEdit(card, c);
        break;
      }
      case 'delete': {
        if (!confirm(`Delete comment by "${c.name}"? This cannot be undone.`)) break;
        const { error } = await db.from('comments').delete().eq('id', c.id);
        if (!error) {
          card.remove();
          allComments = allComments.filter(x => x.id !== c.id);
          renderTabs();
        }
        break;
      }
    }
  }

  function startEdit(card, c) {
    const bodyEl    = document.getElementById(`body-${c.id}`);
    const actionsEl = document.getElementById(`actions-${c.id}`);
    if (!bodyEl || !actionsEl) return;

    actionsEl.style.display = 'none';
    bodyEl.style.display    = 'none';

    const form = document.createElement('form');
    form.className = 'comment-edit-form';
    form.innerHTML = `
      <input type="text" name="name"    value="${esc(c.name)}"         placeholder="Name"    required maxlength="100">
      <input type="url"  name="link"    value="${esc(c.link || '')}"    placeholder="Link"    maxlength="500">
      <textarea          name="comment" required maxlength="2000">${esc(c.comment)}</textarea>
      <div class="comment-edit-row">
        <button type="submit" class="admin-btn approve">Save</button>
        <button type="button" class="admin-btn" id="cancel-${esc(c.id)}">Cancel</button>
      </div>
    `;
    card.appendChild(form);

    document.getElementById(`cancel-${c.id}`).addEventListener('click', () => {
      form.remove();
      actionsEl.style.display = '';
      bodyEl.style.display    = '';
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const btn = form.querySelector('[type="submit"]');
      btn.textContent = 'Saving…'; btn.disabled = true;

      const newName    = form.name.value.trim();
      const newLink    = form.link.value.trim();
      const newComment = form.comment.value.trim();

      const { error } = await db.from('comments').update({
        name: newName, link: newLink, comment: newComment,
        updated_at: new Date().toISOString(),
      }).eq('id', c.id);

      if (!error) {
        c.name = newName; c.link = newLink; c.comment = newComment;
        refreshCard(card, c);
      } else {
        btn.textContent = 'Save'; btn.disabled = false;
      }
    });

    form.querySelector('textarea').focus();
  }

  boot();
</script>
</body>
</html>
